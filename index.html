<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Explore the World</h1>
        <nav>
            <ul>
                <li><a href="#destinations">Destinations</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="destinations">
            <h2>Popular Destinations</h2>
            <div class="destination">
                <img src="https://via.placeholder.com/300x200?text=Paris" alt="Paris">
                <h3>Paris</h3>
                <p>The city of lights.</p>
            </div>
            <div class="destination">
                <img src="https://via.placeholder.com/300x200?text=Tokyo" alt="Tokyo">
                <h3>Tokyo</h3>
                <p>A blend of tradition and modernity.</p>
            </div>
        </section>

        <section id="about">
            <h2>About Us</h2>
            <p>We are passionate about travel and helping you discover new places.</p>
        </section>

        <section id="contact">
            <h2>Contact</h2>
            <form>
                <input type="text" placeholder="Your name" required>
                <input type="email" placeholder="Your email" required>
                <textarea placeholder="Your message" required></textarea>
                <button type="submit">Send</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Travel Website. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
